version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_dev
      POSTGRES_DB: portfolio_intel
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://portfolio:portfolio_dev@postgres:5432/portfolio_intel
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
